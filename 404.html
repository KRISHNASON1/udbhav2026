<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Vedansh</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <meta name="robots" content="noindex" />

  <!-- Same Google Fonts as main portfolio -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;1,400;1,700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-ui: 'Inter', system-ui, sans-serif;
      --font-fraunces: 'Fraunces', serif;
      --clr-bg: #000000;
      --clr-white: #ffffff;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--clr-bg);
      color: var(--clr-white);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Grain overlay ─────────────────────────────────────────────── */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 50;
      opacity: 0.55;
      animation: grain-shift 8s steps(10) infinite;
    }
    @keyframes grain-shift {
      0%, 100% { transform: translate(0, 0); }
      10%       { transform: translate(-2%, -3%); }
      20%       { transform: translate(3%, 2%); }
      30%       { transform: translate(-1%, 3%); }
      40%       { transform: translate(2%, -1%); }
      50%       { transform: translate(-3%, 2%); }
      60%       { transform: translate(1%, -2%); }
      70%       { transform: translate(3%, 3%); }
      80%       { transform: translate(-2%, 1%); }
      90%       { transform: translate(2%, -3%); }
    }

    /* ── Ambient glow ──────────────────────────────────────────────── */
    .glow {
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Page layout ───────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Empty container (mirrors shadcn Empty) ────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    /* ── EmptyHeader ───────────────────────────────────────────────── */
    .empty-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    /* ── Big 404 — mask-b-from-20% mask-b-to-80% equivalent ─────────  */
    .empty-title {
      font-family: var(--font-ui);
      font-size: clamp(7rem, 22vw, 13rem);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      color: #ffffff;

      /* The Tailwind mask-b-from-20% mask-b-to-80% effect:
         gradient mask fading bottom portion of the text to transparent */
      -webkit-mask-image: linear-gradient(to bottom, black 20%, transparent 82%);
      mask-image:         linear-gradient(to bottom, black 20%, transparent 82%);
    }

    /* ── EmptyDescription ──────────────────────────────────────────── */
    .empty-description {
      font-family: var(--font-ui);
      font-size: 0.925rem;
      font-weight: 400;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.50);
      margin-top: -2rem;  /* -mt-8 */
    }

    /* ── EmptyContent / buttons ────────────────────────────────────── */
    .empty-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .btn-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Primary button — Go Home */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      transition:
        background   0.2s ease,
        border-color 0.2s ease,
        color        0.2s ease,
        transform    0.15s ease,
        box-shadow   0.2s ease;
      cursor: none;
    }

    .btn--primary {
      background: #ffffff;
      color: #0a0a0a;
      border: 1px solid transparent;
    }
    .btn--primary:hover {
      background: rgba(255, 255, 255, 0.88);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.12);
    }

    .btn--outline {
      background: transparent;
      color: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }
    .btn--outline:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.30);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .btn svg {
      flex-shrink: 0;
    }

    /* ── Back link ─────────────────────────────────────────────────── */
    .back-link {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.22);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s ease;
    }
    .back-link:hover {
      color: rgba(255, 255, 255, 0.50);
    }

    /* ── Custom cursor ─────────────────────────────────────────────── */
    html, body, * { cursor: none !important; }

    .cursor {
      position: fixed;
      width: 32px;
      height: 32px;
      pointer-events: none;
      z-index: 99999;
      left: -100px;
      top: -100px;
      mix-blend-mode: difference;
      background-image: url('/cursor.svg');
      background-size: contain;
      background-repeat: no-repeat;
      will-change: left, top;
    }

    @media (hover: none) {
      .cursor { display: none; }
      html, body, * { cursor: auto !important; }
    }

    /* ── Entrance animation ─────────────────────────────────────────── */
    .empty-title,
    .empty-description,
    .btn-row,
    .back-link {
      animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .empty-description { animation-delay: 0.10s; }
    .btn-row            { animation-delay: 0.20s; }
    .back-link          { animation-delay: 0.28s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); filter: blur(5px); }
      to   { opacity: 1; transform: translateY(0);    filter: blur(0);   }
    }
  </style>
  <link rel="stylesheet" href="/mobile-perf.css" />
</head>

<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor404" aria-hidden="true"></div>

  <!-- Grain texture -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Ambient glow -->
  <div class="glow" aria-hidden="true"></div>

  <!-- 404 content -->
  <main class="page" role="main">
    <div class="empty">

      <!-- Header: big 404 + description -->
      <div class="empty-header">
        <div class="empty-title" aria-label="404 error">404</div>
        <p class="empty-description">
          The page you're looking for might have been<br>
          moved or doesn't exist.
        </p>
      </div>

      <!-- Buttons -->
      <div class="empty-content">
        <div class="btn-row">

          <!-- Go Home -->
          <a href="/" class="btn btn--primary" aria-label="Go to home page">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Go Home
          </a>

          <!-- Explore -->
          <a href="/#workSection" class="btn btn--outline" aria-label="Explore my work">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
            </svg>
            Explore
          </a>

        </div>

        <!-- Subtle back link -->
        <a href="javascript:history.back()" class="back-link">← Go back</a>
      </div>

    </div>
  </main>

  <script>
    // Custom cursor same as main site
    const cursor = document.getElementById('cursor404');
    if (cursor && window.matchMedia('(hover: hover)').matches) {
      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top  = e.clientY + 'px';
      });
    }
  </script>

  <script type="module" src="/src/analytics.js"></script>
  <script src="/mobile-perf.js" defer></script>
</body>
</html>
